defaults :
  - physicsnemo_default
  - arch:
      - fully_connected
  - scheduler: tf_exponential_lr
  - optimizer: adam
  - loss: sum
  - _self_
  
scheduler:
  decay_rate: 0.95
  decay_steps: 500

cuda_graphs: False

training:
  rec_validation_freq: 100
  rec_inference_freq: 100
  rec_monitor_freq: 100
  rec_constraint_freq: 100
  max_steps : 50_000
  grad_agg_freq: 1
  ntk:
     use_ntk   : true
     run_freq  : 1000
     save_name : ntk # Set cuda_graphs: False if logging ntk value

batch_size:
  Interior: 4096
  IC: 2048
  BC: 2048

graph:
  func_arch: true

network_dir: "ntk"
initialization_network_dir: ""
